<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مجد ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffcccc, #ffe6e6, #fff0f5);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Tahoma, sans-serif;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 4em;
      color: red;
      animation: pulse 1.5s infinite;
      text-shadow: 0 0 20px #ff3366;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(1); }
    }

    .message {
      font-size: 1.5em;
      margin-top: 30px;
      color: #660033;
      text-shadow: 0 0 10px #ff99cc;
      text-align: center;
      max-width: 80%;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background-color: #ff3366;
      border: none;
      color: white;
      padding: 15px 25px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px #ff99cc;
    }

    button:hover {
      background-color: #cc0052;
    }

    .counter {
      margin-top: 5px;
      font-size: 1em;
      color: #333;
      text-align: center;
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 2em;
      animation: fall 6s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10%); opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>مجد</h1>
<div class="message" id="message">أنتِ نعمة من الله 🌹</div>

<div class="buttons">

  <div>
    <button onclick="showText('morning')">أذكار الصباح</button>
    <div class="counter" id="morningCounter">0</div>
  </div>

  <div>
    <button onclick="showText('evening')">أذكار المساء</button>
    <div class="counter" id="eveningCounter">0</div>
  </div>

  <div>
    <button onclick="showText('duaa')">أدعية</button>
    <div class="counter" id="duaaCounter">0</div>
  </div>

</div>

<script>
  const morningAzkar = [
    "آية الكرسي","سورة الإخلاص","سورة الفلق","سورة الناس",
    "أصبحنا وأصبح الملك لله","اللهم بك أصبحنا وبك نحيا",
    "بسم الله الذي لا يضر مع اسمه شيء",
    "رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا",
    "اللهم ما أصبح بي من نعمة","اللهم عافني في بدني",
    "اللهم إني أسألك العفو والعافية","سبحان الله وبحمده",
    "لا إله إلا الله وحده لا شريك له"
  ];

  const eveningAzkar = [
    "آية الكرسي","سورة الإخلاص","سورة الفلق","سورة الناس",
    "أمسينا وأمسى الملك لله","اللهم بك أمسينا وبك نحيا",
    "بسم الله الذي لا يضر مع اسمه شيء",
    "رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا",
    "اللهم ما أمسى بي من نعمة","اللهم عافني في بدني",
    "اللهم إني أسألك العفو والعافية","سبحان الله وبحمده",
    "لا إله إلا الله وحده لا شريك له"
  ];

  const duaas = [
    "ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة",
    "رب اغفر لي ولوالدي",
    "رب اشرح لي صدري",
    "رب زدني علماً",
    "اللهم اغفر لي",
    "اللهم اهد قلبي",
    "اللهم ارزقني الطمأنينة",
    "اللهم اجعلني من الذاكرين",
    "اللهم اجعلني من الشاكرين",
    "اللهم اجعلني من الصابرين",
    "اللهم اجعل أيامنا خيرًا",
    "اللهم بارك لنا فيما أعطيت",
    "اللهم أسعد قلوبنا",
    "اللهم فرّج همنا",
    "اللهم اشف مرضانا",
    "اللهم احفظ من نحب",
    "اللهم اجعلنا من أهل الجنة"
  ];

  const counters = {
    morning: 0,
    evening: 0,
    duaa: 0
  };

  function showText(type) {
    let list;
    if (type === "morning") list = morningAzkar;
    if (type === "evening") list = eveningAzkar;
    if (type === "duaa") list = duaas;

    const text = list[Math.floor(Math.random() * list.length)];
    document.getElementById("message").innerText = text;

    counters[type]++;
    document.getElementById(type + "Counter").innerText = counters[type];

    createHeart();
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }
</script>

</body>
</html>
