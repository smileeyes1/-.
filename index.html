<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Tahoma,sans-serif;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:360px;
  padding:14px;
  text-align:center;
}

/* ===== الأسماء ===== */
.name{
  font-size:2.6em;
  margin:6px 0;
}
.name span{color:#ff4d6d;}
.name.glow span{animation:sparkle 1.4s infinite alternate;}

@keyframes sparkle{
  from{ text-shadow:0 0 6px currentColor; }
  to{ text-shadow:0 0 22px currentColor; }
}

/* ===== الرسالة ===== */
.message{
  background:#fff;
  border-radius:16px;
  padding:16px;
  font-size:1.15em;
  min-height:100px;
  margin:14px 0;
  line-height:1.8;
}

/* ===== الأزرار ===== */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:#fff;
  font-size:1em;
}

.counter{
  font-size:.85em;
  margin:6px 0;
}

/* ===== القلوب ===== */
.particle{
  position:fixed;
  pointer-events:none;
  animation:floatUp 3s ease-out forwards;
}
@keyframes floatUp{
  to{opacity:0;transform:translateY(-140px) scale(1.6)}
}

/* ===== نافذة السر ===== */
.secret-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.secret-box{
  background:#fff0f5;
  padding:24px;
  border-radius:22px;
  text-align:center;
  width:80%;
  max-width:300px;
  animation:pop .6s ease;
}
.secret-box h3{
  margin-bottom:12px;
  color:#ff4d6d;
}
.secret-box button{
  background:linear-gradient(135deg,#ff0844,#ffb199);
  animation:pulse 1.4s infinite;
}

.hidden{display:none;}

@keyframes pop{
  from{transform:scale(.6);opacity:0}
  to{transform:scale(1);opacity:1}
}
@keyframes pulse{
  50%{box-shadow:0 0 25px #ff4d6d}
}
</style>
</head>

<body>

<div class="container">

  <div class="name glow" id="majd"></div>
  <div class="name" id="moh"></div>

  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <button id="loveBtn" onclick="love()">لمسة حب ❤️</button>
  <div class="counter" id="count">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 💫</button>

</div>

<div id="secretOverlay" class="secret-overlay hidden">
  <div class="secret-box">
    <h3>💖 من محمد</h3>
    <button onclick="secret()">افتح الكلمة 💌</button>
  </div>
</div>

<script>
/* ===== بناء الأسماء ===== */
function buildName(id,text){
  const el=document.getElementById(id);
  el.innerHTML="";
  [...text].forEach(l=>{
    const s=document.createElement("span");
    s.textContent=l;
    el.appendChild(s);
  });
}
buildName("majd","مجد");
buildName("moh","محمد");

/* ===== القلوب ===== */
const shapes=["❤️","💖","💕","✨","🌸"];
function burst(n){
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    p.style.left=Math.random()*innerWidth+"px";
    p.style.top=Math.random()*innerHeight+"px";
    p.style.fontSize=(Math.random()*1.5+1)+"em";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

/* ===== التحقق من وقت المغرب ===== */
function isMaghribTime(){
  const hour=new Date().getHours();
  return hour >= 18;
}

/* ===== العدّاد ===== */
let touches=0;

function love(){
  if(!isMaghribTime()){
    message.textContent="النافذة السرية تُفتح عند المغرب 🌙";
    burst(10);
    return;
  }

  if(localStorage.getItem("secretOpened")) return;

  touches++;
  count.textContent=`${touches} / 7`;
  burst(25);

  if(touches===7){
    secretOverlay.classList.remove("hidden");
    burst(120);
  }
}

/* ===== 30 أذكار الصباح ===== */
const morningAzkar=[

"رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا",
"اللهم ما أصبح بي من نعمة فمنك وحدك لا شريك لك",
"حسبي الله لا إله إلا هو عليه توكلت",
"سبحان الله وبحمده",
"سبحان الله العظيم",
"لا إله إلا الله وحده لا شريك له",
"اللهم إني أسألك خير هذا اليوم",
"يا حي يا قيوم برحمتك أستغيث",
"اللهم عافني في بدني",
"اللهم عافني في سمعي",
"اللهم عافني في بصري",
"اللهم إني أعوذ بك من الكفر والفقر",
"اللهم احفظني من بين يديّ ومن خلفي",
"اللهم استرني فوق الأرض وتحت الأرض",
"اللهم طمئن قلبي",
"اللهم نوّر يومي",
"اللهم اجعل يومي خيرًا",
"اللهم ارزقني رزقًا حلالًا طيبًا",
"اللهم يسّر أمري",
"اللهم وفقني لما تحب وترضى",
"اللهم اغفر لي",
"اللهم اهدني",
"اللهم قرّبني إليك",
"اللهم اجعل عملي صالحًا",
"اللهم لا تكلني لنفسي",
"اللهم بارك لي في وقتي",
"والحمد لله رب العالمين"
];

/* ===== 30 أذكار المساء ===== */
const eveningAzkar=[
"أمسينا وأمسى الملك لله",

/* ===== 30 دعاء ===== */
const duaas=[
"اللهم اجبر قلبي جبرًا يليق بعظمتك",
"اللهم ارزقني طمأنينة لا تزول",

/* ===== 30 كلمة سرية ===== */
const secretWords=[
"مجد… وجودك في حياتي نعمة من الله 💖",
"أحبك بهدوء يشبه الطمأنينة",
"قربك أمان حقيقي",
"اسمك وحده راحة",
"أبتسم كلما خطرتِ في بالي",
"وجودك فرّق كثيرًا في حياتي",
"قلبك جميل ونقي",
"ضحكتك حياة",
"حديثك يهدئني",
"أختارك كل مرة",
"أحبك بلا شروط",
"معك أشعر بالأمان",

"أحب حضورك الهادئ",
"قربك سلام",
"أنتِ نور بسيط لكن عميق",
"أحبك دون ضجيج",
"مكانك في قلبي ثابت",
"أنتِ معنى السعادة",
"قربك يكفيني",
"أحب اسمك",
"أثق بك",
"وجودك يطمئن قلبي",
"أحب تفاصيلك الصغيرة",
"أفضّلك دائمًا",
"أنتِ مختلفة حقًا",
"قلبك أبيض",
"أحبك باحترام وصدق",
"أنتِ اختياري",
"محمد 💌"
];

/* ===== التتابع ===== */
const message=document.getElementById("message");
let mi=0,ei=0,di=0,si=0;

function morning(){message.textContent=morningAzkar[mi++%30];burst(20);}
function evening(){message.textContent=eveningAzkar[ei++%30];burst(20);}
function duaa(){message.textContent=duaas[di++%30];burst(20);}
function secret(){
  message.textContent=secretWords[si++%30];
  burst(120);
  secretOverlay.classList.add("hidden");
  localStorage.setItem("secretOpened","true");
}
</script>

</body>
</html>
