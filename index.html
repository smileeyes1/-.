<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Tahoma,sans-serif;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
}
.container{
  width:100%;
  max-width:360px;
  padding:14px;
  text-align:center;
}

/* ===== الأسماء ===== */
.name{
  font-size:2.6em;
  margin:6px 0;
}
.name span{color:#ff4d6d;}
.name.glow span{animation:sparkle 1.4s infinite alternate;}

@keyframes sparkle{
  from{ text-shadow:0 0 6px currentColor; }
  to{ text-shadow:0 0 22px currentColor; }
}

/* ===== الرسالة ===== */
.message{
  background:#fff;
  border-radius:16px;
  padding:16px;
  font-size:1.15em;
  min-height:100px;
  margin:14px 0;
  line-height:1.8;
}

/* ===== الأزرار ===== */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:#fff;
  font-size:1em;
}
.counter{font-size:.85em;margin:6px 0;}

/* ===== القلوب ===== */
.particle{
  position:fixed;
  pointer-events:none;
  animation:floatUp 3s ease-out forwards;
}
@keyframes floatUp{
  to{opacity:0;transform:translateY(-140px) scale(1.6)}
}

/* ===== السر ===== */
.secret-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.secret-box{
  background:#fff0f5;
  padding:24px;
  border-radius:22px;
  width:80%;
  max-width:300px;
  animation:pop .6s ease;
}
.secret-box h3{color:#ff4d6d;}
.secret-box button{
  background:linear-gradient(135deg,#ff0844,#ffb199);
  animation:pulse 1.4s infinite;
}
.hidden{display:none;}

@keyframes pop{
  from{transform:scale(.6);opacity:0}
  to{transform:scale(1);opacity:1}
}
@keyframes pulse{
  50%{box-shadow:0 0 25px #ff4d6d}
}
</style>
</head>

<body>

<div class="container">
  <div class="name glow" id="majd"></div>
  <div class="name" id="moh"></div>

  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <button onclick="love()">لمسة حب ❤️</button>
  <div class="counter" id="count">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 💫</button>
</div>

<div id="secretOverlay" class="secret-overlay hidden">
  <div class="secret-box">
    <h3>💖 من محمد</h3>
    <button onclick="secret()">افتح الكلمة 💌</button>
  </div>
</div>

<script>
/* ===== الأسماء ===== */
function buildName(id,text){
  const el=document.getElementById(id);
  el.innerHTML="";
  [...text].forEach(l=>{
    const s=document.createElement("span");
    s.textContent=l;
    el.appendChild(s);
  });
}
buildName("majd","مجد");
buildName("moh","محمد");

/* ===== القلوب ===== */
const shapes=["❤️","💖","💕","✨","🌸"];
function burst(n){
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    p.style.left=Math.random()*innerWidth+"px";
    p.style.top=Math.random()*innerHeight+"px";
    p.style.fontSize=(Math.random()*1.5+1)+"em";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

/* ===== العداد ===== */
let touches=0;
function love(){
  touches++;
  count.textContent=`${touches} / 7`;
  burst(25);
  if(touches===7){
    secretOverlay.classList.remove("hidden");
    burst(120);
  }
}

const secretWords=[

/* ===== التتابع ===== */

let mi=0,ei=0,di=0,si=0;

</script>
