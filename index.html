<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Tahoma,sans-serif;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:360px;
  padding:14px;
  text-align:center;
}

/* ===== قلب ينبض ===== */
.heart{
  width:220px;
  height:200px;
  margin:0 auto 10px;
  position:relative;
  transform:rotate(-45deg);
  background:#ff4d6d;
  animation:heartBeat 1.4s infinite;
}
.heart::before,
.heart::after{
  content:"";
  width:220px;
  height:200px;
  background:#ff4d6d;
  border-radius:50%;
  position:absolute;
}
.heart::before{top:-110px; left:0;}
.heart::after{left:110px; top:0;}

@keyframes heartBeat{
  0%{transform:scale(1) rotate(-45deg);}
  50%{transform:scale(1.08) rotate(-45deg);}
  100%{transform:scale(1) rotate(-45deg);}
}

/* ===== أسماء داخل القلب ===== */
.names{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transform:rotate(45deg);
}

.name{
  font-size:2.4em;
  margin:4px 0;
}
.name span{
  animation:colorGlow 2s infinite alternate;
}

@keyframes colorGlow{
  0%{color:#fff; text-shadow:0 0 6px #fff;}
  50%{color:#ffe066; text-shadow:0 0 14px #ffec99;}
  100%{color:#ffffff; text-shadow:0 0 20px #ffffff;}
}

/* ===== الرسالة ===== */
.message{
  background:white;
  border-radius:16px;
  padding:16px;
  font-size:1.15em;
  min-height:100px;
  margin:14px 0;
  line-height:1.8;
}

/* ===== الأزرار ===== */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:white;
  font-size:1em;
}

/* ===== نافذة السر ===== */
.secret-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.secret-box{
  background:#fff0f5;
  padding:24px;
  border-radius:22px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

  <!-- القلب -->
  <div class="heart">
    <div class="names">
      <div class="name" id="majd"></div>
      <div class="name" id="moh"></div>
    </div>
  </div>

  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <button onclick="love()">لمسة حب ❤️</button>
  <div id="counter">0 / 7</div>

</div>

<div id="secretOverlay" class="secret-overlay hidden">
  <div class="secret-box">
    <h3>💖 من محمد</h3>
    <button onclick="secret()">افتح الكلمة 💌</button>
  </div>
</div>

<script>
/* ===== بناء نص متلألئ ===== */
function buildText(id,text){
  const el=document.getElementById(id);
  [...text].forEach(l=>{
    const s=document.createElement("span");
    s.textContent=l;
    el.appendChild(s);
  });
}
buildText("majd","مجد");
buildText("moh","محمد");

const message=document.getElementById("message");
const overlay=document.getElementById("secretOverlay");

/* ===== وقت المغرب ===== */
function isAfterMaghrib(){
  const h=new Date().getHours();
  return (h>=18 || h<5);
}

/* ===== إعادة تعيين يومي بعد الفجر ===== */
function resetIfFajr(){
  const h=new Date().getHours();
  if(h>=5){
    localStorage.removeItem("secretCount");
  }
}
resetIfFajr();

/* ===== العدادات ===== */
let touches=0;

function love(){
  if(!isAfterMaghrib()){
    message.textContent="الكلمات السرية تظهر بعد المغرب 🌙";
    return;
  }

  touches++;
  counter.textContent=`${touches} / 7`;

  if(touches===7){
    overlay.classList.remove("hidden");
  }
}

/* ===== كلمات سرية: 5 مرات فقط ===== */
const secretWords=[
"مجد… وجودك في حياتي نعمة من الله",
"أحبك بهدوء يشبه الطمأنينة",
"قربك أمان حقيقي",
"اسمك في قلبي قبل لساني",
"أدعُ لك كل ليلة",
"وجودك فرق في حياتي",
"قلبك جميل ونقي",
"حديثك راحة",
"قربك سلام",
"أنتِ اختياري"
];

let si=0;

function secret(){
  let count=Number(localStorage.getItem("secretCount")||0);

  if(count>=5){
    message.textContent="اكتملت كلمات اليوم 💖، تعود بعد المغرب القادم";
    overlay.classList.add("hidden");
    return;
  }

  message.textContent=secretWords[si++%secretWords.length];
  localStorage.setItem("secretCount",count+1);
  overlay.classList.add("hidden");
}
</script>

</body>
</html>
