<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد 🤍</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Tahoma,sans-serif;
  background:linear-gradient(135deg,#ffe6eb,#fff0f5,#ffe6eb);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:360px;
  padding:14px;
  text-align:center;
}

/* ===== الهالة ===== */
.aura{
  width:220px;
  height:160px;
  margin:0 auto 16px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,200,210,0.55),
    rgba(255,200,210,0.25),
    rgba(255,200,210,0)
  );
  animation:auraBreath 5s ease-in-out infinite;
  display:flex;
  justify-content:center;
  align-items:center;
}

@keyframes auraBreath{
  0%{box-shadow:0 0 18px rgba(255,150,170,.5);}
  50%{box-shadow:0 0 44px rgba(255,120,150,.9);}
  100%{box-shadow:0 0 18px rgba(255,150,170,.5);}
}

/* ===== الأسماء الواضحة ===== */
.name{
  font-size:2.2em;
  margin:4px 0;
  font-weight:600;
}

/* مجد */
.name.majd{
  color:#c2255c;
  animation:majdGlow 4s ease-in-out infinite;
}

/* محمد */
.name.moh{
  color:#b08900;
  animation:mohGlow 4s ease-in-out infinite;
}

@keyframes majdGlow{
  0%{text-shadow:0 0 4px rgba(194,37,92,.6);}
  50%{text-shadow:0 0 16px rgba(194,37,92,1);}
  100%{text-shadow:0 0 4px rgba(194,37,92,.6);}
}

@keyframes mohGlow{
  0%{text-shadow:0 0 4px rgba(176,137,0,.6);}
  50%{text-shadow:0 0 16px rgba(176,137,0,1);}
  100%{text-shadow:0 0 4px rgba(176,137,0,.6);}
}

/* ===== الرسالة ===== */
.message{
  background:white;
  border-radius:16px;
  padding:16px;
  font-size:1.1em;
  min-height:100px;
  margin:14px 0;
  line-height:1.8;
}

/* ===== الأزرار ===== */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#ff6b81;
  color:white;
  font-size:1em;
}

.counter{
  font-size:.85em;
  margin:6px 0;
}

/* ===== نافذة السر ===== */
.secret-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.secret-box{
  background:#fff0f5;
  padding:24px;
  border-radius:22px;
  text-align:center;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

  <div class="aura">
    <div>
      <div class="name majd">مجد</div>
      <div class="name moh">محمد</div>
    </div>
  </div>

  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <button onclick="love()">لمسة حب 🤍</button>
  <div class="counter" id="counter">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 💫</button>

</div>

<div id="secretOverlay" class="secret-overlay hidden">
  <div class="secret-box">
    <h3>🤍 من زوجك</h3>
    <button onclick="secret()">افتح الكلمة</button>
  </div>
</div>

<script>
const message=document.getElementById("message");
const overlay=document.getElementById("secretOverlay");

function afterMaghrib(){
  const h=new Date().getHours();
  return (h>=18 || h<5);
}

if(new Date().getHours()>=5){
  localStorage.removeItem("secretCount");
}

let touches=0;
function love(){
  if(!afterMaghrib()){
    message.textContent="الكلمات الخاصة تُفتح بعد المغرب 🌙";
    return;
  }
  touches++;
  counter.textContent=`${touches} / 7`;
  if(touches===7){
    overlay.classList.remove("hidden");
  }
}

/* ===== 30 أذكار الصباح ===== */
const morningAzkar=[
"أصبحنا وأصبح الملك لله",
"اللهم بك أصبحنا وبك أمسينا وبك نحيا وبك نموت",
"الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور",
"رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا",
"اللهم ما أصبح بي من نعمة فمنك وحدك لا شريك لك",
"حسبي الله لا إله إلا هو عليه توكلت",
"سبحان الله وبحمده",
"سبحان الله العظيم",
"لا إله إلا الله وحده لا شريك له",
"اللهم إني أسألك خير هذا اليوم",
"يا حي يا قيوم برحمتك أستغيث",
"اللهم عافني في بدني",
"اللهم عافني في سمعي",
"اللهم عافني في بصري",
"اللهم إني أعوذ بك من الكفر والفقر",
"اللهم احفظني من بين يدي ومن خلفي",
"اللهم استرني فوق الأرض وتحت الأرض",
"اللهم طمئن قلبي",
"اللهم نوّر يومي",
"اللهم اجعل يومي خيرًا",
"اللهم ارزقني رزقًا حلالًا طيبًا",
"اللهم يسّر أمري",
"اللهم وفقني لما تحب وترضى",
"اللهم اغفر لي ذنوبي",
"اللهم اهدني لأحسن الأخلاق",
"اللهم قرّبني إليك",
"اللهم اجعل عملي صالحًا",
"اللهم لا تكلني لنفسي",
"اللهم بارك لي في وقتي",
"والحمد لله رب العالمين"
];

/* ===== 30 أذكار المساء ===== */
const eveningAzkar=[
"أمسينا وأمسى الملك لله",
"اللهم بك أمسينا وبك أصبحنا",
"أعوذ بكلمات الله التامات من شر ما خلق",
"حسبي الله لا إله إلا هو عليه توكلت",
"سبحان الله وبحمده",
"سبحان الله العظيم",
"اللهم اغفر لي ذنوبي",
"اللهم ارح قلبي",
"اللهم اجعل لي سكينة",
"اللهم طمئن نفسي",
"اللهم استرني",
"اللهم اجبر خاطري",
"اللهم احفظني من كل سوء",
"اللهم احفظ أهلي",
"اللهم ارزقني الرضا",
"اللهم نوّر قلبي",
"اللهم أعذني من الهم والحزن",
"اللهم قربني إليك",
"اللهم تقبل مني",
"اللهم ارح ضعفي",
"اللهم اجعل نومي راحة",
"اللهم احفظ أحبتي",
"اللهم لا تحرمني الأمل",
"اللهم ارزقني سلامًا داخليًا",
"اللهم ثبت قلبي",
"اللهم أنس وحشتي",
"اللهم اجعل غدي أجمل",
"اللهم اختم يومي بخير",
"اللهم اغفر لي ولوالدي",
"والحمد لله"
];

/* ===== 30 دعاء ===== */
const duaas=[
"اللهم اجبر قلبي جبرًا يليق بعظمتك",
"اللهم ارزقني طمأنينة لا تزول",
"اللهم اشفِ صدري",
"اللهم اكفني ما أهمني",
"اللهم لا تتركني لنفسي طرفة عين",
"اللهم افتح لي أبواب الخير",
"اللهم ارزقني سلامًا داخليًا",
"اللهم ارح قلبي من التعب",
"اللهم دلني على الصواب",
"اللهم يسر أمري",
"اللهم قرّب لي الخير",
"اللهم أبعد عني الشر",
"اللهم لا تخيب رجائي",
"اللهم زدني قربًا منك",
"اللهم ارزقني الرضا",
"اللهم اجعلني من السعداء",
"اللهم ثبت قلبي على طاعتك",
"اللهم أعنّي على ذكرك وشكرك",
"اللهم احفظ قلبي من القسوة",
"اللهم بارك لي في حياتي",
"اللهم ارزقني صبرًا جميلًا",
"اللهم ارزقني فرحًا دائمًا",
"اللهم لا تكسر لي خاطرًا",
"اللهم اجعلني مطمئنًا",
"اللهم اكتب لي الخير حيث كان",
"اللهم طهّر قلبي",
"اللهم تقبل دعائي",
"اللهم اشرح صدري",
"اللهم نوّر طريقي",
"اللهم أحسن خاتمتي"
];

/* ===== 30 كلمة سرّية ===== */
const secretWords=[
"مجد… وجودك في حياتي نعمة من الله",
"أحبك بهدوء يشبه الطمأنينة",
"قربك أمان حقيقي",
"اسمك في قلبي قبل لساني",
"أدعُ لك كل ليلة",
"وجودك فرق في حياتي",
"قلبك جميل ونقي",
"حديثك راحة",
"قربك سلام",
"أنتِ اختياري",
"أحبك بلا شروط",
"أثق بك",
"ضحكتك حياة",
"حضورك يطمئنني",
"دعائي لك لا ينقطع",
"قربك يكفيني",
"أحب تفاصيلك",
"قلبك أبيض",
"أحب اسمك",
"أراك سكينة",
"وجودك لطف",
"قربك نجاة",
"أحب هدوءك",
"أرتاح معك",
"أبتسم لأجلك",
"أحبك بصدق",
"لكِ مكانة عظيمة",
"وجودك نعمة",
"أنتِ أمان",
"محمد 🤍"
];

let mi=0,ei=0,di=0,si=0;
function morning(){message.textContent=morningAzkar[mi++%30];}
function evening(){message.textContent=eveningAzkar[ei++%30];}
function duaa(){message.textContent=duaas[di++%30];}
function secret(){
  let c=Number(localStorage.getItem("secretCount")||0);
  if(c>=5){
    message.textContent="اكتملت كلمات اليوم 🤍";
    overlay.classList.add("hidden");
    return;
  }
  message.textContent=secretWords[si++%30];
  localStorage.setItem("secretCount",c+1);
  overlay.classList.add("hidden");
}
</script>

</body>
</html>
