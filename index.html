<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Tahoma,sans-serif;
  overflow:hidden;
}
@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:390px;
  text-align:center;
  padding:20px;
}
h1{
  color:red;
  font-size:3em;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.15)}
  100%{transform:scale(1)}
}
.message{
  background:rgba(255,255,255,.95);
  padding:18px;
  border-radius:16px;
  min-height:90px;
  font-size:1.25em;
  margin:20px 0;
  transition:.5s;
}
button{
  width:100%;
  margin-top:8px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#ff4d6d;
  color:#fff;
  font-size:1.1em;
  cursor:pointer;
}
button:disabled{
  background:#bbb;
}
.counter{
  font-size:.9em;
  color:#333;
}
.heart{
  position:absolute;
  font-size:1.7em;
  animation:fall 6s linear forwards;
}
@keyframes fall{
  from{top:-10vh;opacity:1}
  to{top:110vh;opacity:0}
}
</style>
</head>

<body>

<div class="container">
  <h1>مجد</h1>

  <div class="message" id="message">
    أنتِ نعمة من الله 🌹
  </div>

  <button onclick="love()">لمسة حب ❤️</button>
  <div class="counter" id="loveCount">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 🙏</button>

  <button id="secretBtn" onclick="secret()" disabled>
    🔒 رسالة سرّية
  </button>
</div>

<script>
const yourName = "محمد وجيه محمود غنام";

const messageBox = document.getElementById("message");
const loveCounter = document.getElementById("loveCount");
const secretBtn = document.getElementById("secretBtn");

let touches = 0;
let morningIndex = 0;
let eveningIndex = 0;
let duaaIndex = 0;
let secretIndex = 0;

const morningAzkar = [
"آية الكرسي",
"سورة الإخلاص",
"سورة الفلق",
"سورة الناس",
"أصبحنا وأصبح الملك لله",
"اللهم بك أصبحنا وبك نحيا",
"بسم الله الذي لا يضر",
"رضيت بالله ربًا",
"اللهم ما أصبح بي من نعمة",
"سبحان الله وبحمده"
];

const eveningAzkar = [
"آية الكرسي",
"سورة الإخلاص",
"سورة الفلق",
"سورة الناس",
"أمسينا وأمسى الملك لله",
"اللهم بك أمسينا",
"بسم الله الذي لا يضر",
"رضيت بالله ربًا",
"اللهم ما أمسى بي من نعمة",
"سبحان الله وبحمده"
];

const duaas = [
"ربنا آتنا في الدنيا حسنة",
"رب اغفر لي ولوالدي",
"رب اشرح لي صدري",
"رب زدني علمًا",
"اللهم اجبر خاطري",
"اللهم ارزقني الطمأنينة",
"اللهم لا ترد دعائي",
"اللهم اختم لي بخير"
];

const secretMessages = [
`أنا ${yourName}… تعلقي فيك هادئ لكنه صادق.`,
`${yourName} يطمئن لفكرتك بدون أسباب.`,
`فيك راحة، وهذا نادر.`,
`${yourName} اختارك بهدوء.`,
`فيك أمان لا يُشرح.`,
`${yourName} يحفظك في قلبه.`,
`قربك جميل… حتى في الصمت.`
];

function love(){
  touches++;
  loveCounter.textContent = `${touches} / 7`;
  createHeart();

  if(touches >= 7){
    secretBtn.disabled = false;
  }
}

function morning(){
  messageBox.textContent = morningAzkar[morningIndex];
  morningIndex = (morningIndex + 1) % morningAzkar.length;
}

function evening(){
  messageBox.textContent = eveningAzkar[eveningIndex];
  eveningIndex = (eveningIndex + 1) % eveningAzkar.length;
}

function duaa(){
  messageBox.textContent = duaas[duaaIndex];
  duaaIndex = (duaaIndex + 1) % duaas.length;
}

function secret(){
  messageBox.textContent = secretMessages[secretIndex];
  secretIndex = (secretIndex + 1) % secretMessages.length;
}

function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
</script>

</body>
</html>
