<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مجد ❤️</title>
  <style>
    body {
      background: linear-gradient(to right, #fff0f5, #ffe6e6);
      font-family: "Tahoma", sans-serif;
      text-align: center;
      color: #660033;
    }
    h1 {
      font-size: 3em;
      color: red;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .message {
      font-size: 1.5em;
      margin-top: 30px;
      color: #333;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <h1 id="majid">مجد</h1>
  <div class="message" id="message">أنتِ نعمة من الله</div>

  <script>
    const messages = [
      "أنتِ نعمة من الله 🌹",
      "أحبكِ في الله 💖",
      "اللهم اجعل بيننا مودة ورحمة ✨",
      "أنتِ سكني وطمأنينتي 💕",
      "دعائي لكِ بالسعادة والرحمة 🌸"
    ];
    let index = 0;
    const msgElement = document.getElementById("message");

    setInterval(() => {
      index = (index + 1) % messages.length;
      msgElement.style.opacity = 0;
      setTimeout(() => {
        msgElement.textContent = messages[index];
        msgElement.style.opacity = 1;
      }, 500);
    }, 2000);
  </script>
</body>
</html>
