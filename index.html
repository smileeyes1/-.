<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Tahoma,sans-serif;
  overflow:hidden;
}
@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:390px;
  text-align:center;
  padding:20px;
}

/* ======= NAMES ======= */
.name{
  font-size:3em;
  cursor:pointer;
  margin:5px 0;
  font-weight:bold;
  background:linear-gradient(90deg,#ff4d6d,#ffb3c6,#ff4d6d);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
  transition:0.5s;
  text-shadow:0 0 15px rgba(255,0,100,.5);
}
@keyframes shine{
  to{background-position:200% center;}
}

.subname{
  font-size:2.2em;
  margin-bottom:10px;
}

/* ======= MESSAGE ======= */
.message{
  background:rgba(255,255,255,.95);
  padding:18px;
  border-radius:16px;
  min-height:90px;
  font-size:1.25em;
  margin:20px 0;
}
button{
  width:100%;
  margin-top:8px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#ff4d6d;
  color:#fff;
  font-size:1.1em;
  cursor:pointer;
}
button:disabled{
  background:#bbb;
}
.counter{
  font-size:.9em;
  color:#333;
}

/* ======= HEART ======= */
.heart{
  position:absolute;
  font-size:1.7em;
  animation:fall 6s linear forwards;
}
@keyframes fall{
  from{top:-10vh;opacity:1}
  to{top:110vh;opacity:0}
}
</style>
</head>

<body>

<div class="container">

  <div class="name" id="majdName" onclick="changeMajd()">مجد</div>
  <div class="name subname" id="mohName" onclick="changeMoh()">محمد</div>

  <div class="message" id="message">
    أنتِ نعمة من الله 🌹
  </div>

  <button onclick="love()">لمسة حب ❤️</button>
  <div class="counter" id="loveCount">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 🙏</button>

  <button id="secretBtn" onclick="secret()" disabled>
    🔒 رسالة سرّية
  </button>
</div>

<script>
/* ===== BASIC ===== */
const yourName = "محمد";
const messageBox = document.getElementById("message");
const loveCounter = document.getElementById("loveCount");
const secretBtn = document.getElementById("secretBtn");

let touches = 0;
let morningIndex = 0;
let eveningIndex = 0;
let duaaIndex = 0;
let secretIndex = 0;

/* ===== COLORS FOR NAMES ===== */
const colorsMajd = [
"linear-gradient(90deg,#ff4d6d,#ffd6e0)",
"linear-gradient(90deg,#ff7a00,#ffe29f)",
"linear-gradient(90deg,#9b5cff,#e0c3fc)",
"linear-gradient(90deg,#00b4d8,#90e0ef)"
];
const colorsMoh = [
"linear-gradient(90deg,#4facfe,#00f2fe)",
"linear-gradient(90deg,#43e97b,#38f9d7)",
"linear-gradient(90deg,#fa709a,#fee140)",
"linear-gradient(90deg,#30cfd0,#330867)"
];

let majdColor = 0;
let mohColor = 0;

/* ===== CHANGE NAME EFFECT ===== */
function changeMajd(){
  majdColor = (majdColor + 1) % colorsMajd.length;
  document.getElementById("majdName").style.background = colorsMajd[majdColor];
}
function changeMoh(){
  mohColor = (mohColor + 1) % colorsMoh.length;
  document.getElementById("mohName").style.background = colorsMoh[mohColor];
}

/* ===== DATA ===== */
const morningAzkar = ["آية الكرسي","سبحان الله وبحمده","رضيت بالله ربًا"];
const eveningAzkar = ["آية الكرسي","أمسينا وأمسى الملك لله","سبحان الله العظيم"];
const duaas = ["ربنا آتنا في الدنيا حسنة","اللهم اجبر خاطري","اللهم اشف قلبي"];

const secretMessages = [
`أنا ${yourName}… ووجودك مريح.`,
`${yourName} يحفظك في قلبه.`,
`فيك طمأنينة نادرة.`,
`اختيارك كان هادئًا.`,
`قربك جميل.`,
`القلب يعرف.`,
`وبك يكتمل الشعور.`
];

/* ===== FUNCTIONS ===== */
function love(){
  touches++;
  loveCounter.textContent = `${touches} / 7`;
  createHeart();
  if(touches >= 7) secretBtn.disabled = false;
}
function morning(){
  messageBox.textContent = morningAzkar[morningIndex];
  morningIndex = (morningIndex + 1) % morningAzkar.length;
}
function evening(){
  messageBox.textContent = eveningAzkar[eveningIndex];
  eveningIndex = (eveningIndex + 1) % eveningAzkar.length;
}
function duaa(){
  messageBox.textContent = duaas[duaaIndex];
  duaaIndex = (duaaIndex + 1) % duaas.length;
}
function secret(){
  messageBox.textContent = secretMessages[secretIndex];
  secretIndex = (secretIndex + 1) % secretMessages.length;
}
function createHeart(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerText = "❤️";
  h.style.left = Math.random()*100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
</script>

</body>
</html>
