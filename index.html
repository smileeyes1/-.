<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Tahoma, sans-serif;
  overflow: hidden;
}

@keyframes bg {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container {
  width: 100%;
  max-width: 380px;
  text-align: center;
  padding: 20px;
}

h1 {
  color: red;
  font-size: 3em;
  text-shadow: 0 0 15px #ff4d6d;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.message {
  margin: 20px auto;
  background: rgba(255,255,255,0.9);
  padding: 18px;
  border-radius: 15px;
  font-size: 1.3em;
  color: #5a0033;
  min-height: 90px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #ff4d6d;
  color: white;
  font-size: 1.2em;
  cursor: pointer;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.heart {
  position: absolute;
  font-size: 1.8em;
  animation: fall 6s linear forwards;
}

@keyframes fall {
  from {top:-10vh; opacity:1;}
  to {top:110vh; opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>مجد</h1>

  <div class="message" id="message">
    أنتِ نعمة من الله 🌹
  </div>

  <button onclick="loveTouch()">لمسة حب ❤️</button>
  <button onclick="duaa()">دعاء لك 🌸</button>
  <button onclick="azkar()">ذكر 🤍</button>
  <button id="secretBtn" onclick="secretMessage()" disabled>
    🔒 رسالة سرية
  </button>
</div>

<script>
let loveCount = 0;

const loveMessages = [
  "وجودك يطمني 🤍",
  "الله يحفظك لي",
  "قلبك أمان",
  "أحب طريقتك",
  "دعائي دايمًا لك",
  "أنتِ شيء جميل في حياتي"
];

const secretMessages = [
  "الرسالة السرية: أحبك بهدوء وصدق ❤️",
  "الرسالة السرية: أنتِ الأمان",
  "الرسالة السرية: وجودك فرق"
];

const duaas = [
  "اللهم أسعد قلبها",
  "اللهم احفظها",
  "اللهم اجعل أيامها راحة",
  "اللهم اكتب لها الخير"
];

const azkarList = [
  "سبحان الله",
  "الحمد لله",
  "لا إله إلا الله",
  "الله أكبر"
];

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function loveTouch(){
  document.getElementById("message").innerText = random(loveMessages);
  loveCount++;
  heartEffect();
  if(navigator.vibrate) navigator.vibrate(80);

  if(loveCount >= 5){
    document.getElementById("secretBtn").disabled = false;
    document.getElementById("secretBtn").innerText = "💌 افتح الرسالة السرية";
  }
}

function secretMessage(){
  document.getElementById("message").innerText = random(secretMessages);
  heartEffect();
}

function duaa(){
  document.getElementById("message").innerText = random(duaas);
  heartEffect();
}

function azkar(){
  document.getElementById("message").innerText = random(azkarList);
}

function heartEffect(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerText = "❤️";
  h.style.left = Math.random()*100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
</script>

</body>
</html>
