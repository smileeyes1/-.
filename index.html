<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Tahoma", sans-serif;
  overflow: hidden;
}

@keyframes bg {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 3.2em;
  color: #fff;
  text-shadow: 0 0 20px #ff3366;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.message {
  margin: 25px auto;
  font-size: 1.4em;
  color: #4a0033;
  background: rgba(255,255,255,0.9);
  border-radius: 15px;
  padding: 20px;
  min-height: 90px;
  transition: 0.5s;
}

.buttons button {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  font-size: 1.2em;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: #ff3366;
  color: white;
  box-shadow: 0 0 15px #ff99cc;
}

.buttons button:hover {
  background: #cc0052;
}

.heart {
  position: absolute;
  font-size: 1.8em;
  color: red;
  animation: fall 6s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh); opacity:1;}
  100% {transform: translateY(110vh); opacity:0;}
}

.sparkle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  animation: spark 1s ease-out forwards;
}

@keyframes spark {
  from {transform: scale(1); opacity:1;}
  to {transform: scale(3); opacity:0;}
}

.music {
  margin-top: 15px;
  color: #fff;
  font-size: 0.9em;
}
</style>
</head>

<body>

<div class="container">
  <h1>مجد</h1>

  <div class="message" id="message">
    وجودك يطمئن القلب 💗
  </div>

  <div class="buttons">
    <button onclick="loveTouch()">لمسة حب 💕</button>
    <button onclick="duaa()">دعاء لك 🌸</button>
    <button onclick="azkar()">ذكر 🤍</button>
  </div>

  <div class="music">
    <audio controls>
      https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c1d2c4d44.mp3
    </audio>
    <div>🎵 موسيقى هادئة</div>
  </div>
</div>

<script>
const loveMessages = [
  "الله يحفظك لي 🤍",
  "وجودك يخلّي الدنيا أهدى",
  "أحب طمأنينتك",
  "قلبك جميل مثل اسمك",
  "أدعُو الله أن يسعدك دائمًا",
  "أحبك بطريقة هادئة وآمنة",
  "ما في شي يجي زي وجودك"
];

const duaas = [
  "اللهم اجعل قلبها مطمئنًا",
  "اللهم أسعدها سعادة لا تزول",
  "اللهم احفظها بعينك التي لا تنام",
  "اللهم ارزقها راحة البال",
  "اللهم اجعل أيامها نورًا"
];

const azkar = [
  "سبحان الله",
  "الحمد لله",
  "لا إله إلا الله",
  "الله أكبر",
  "لا حول ولا قوة إلا بالله"
];

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function loveTouch(){
  document.getElementById("message").innerText = random(loveMessages);
  sparkle();
  heart();
  if(navigator.vibrate) navigator.vibrate(80);
}

function duaa(){
  document.getElementById("message").innerText = random(duaas);
  heart();
}

function azkar(){
  document.getElementById("message").innerText = random(azkar);
}

function heart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}

function sparkle(){
  for(let i=0;i<8;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}
</script>

</body>
</html>
