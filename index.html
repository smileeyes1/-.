<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مجد ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffcccc, #ffe6e6, #fff0f5);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Tahoma", sans-serif;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 4em;
      color: red;
      animation: pulse 1.5s infinite;
      text-shadow: 0 0 20px #ff3366;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .message {
      font-size: 2em;
      margin-top: 30px;
      color: #660033;
      transition: opacity 1s;
      text-shadow: 0 0 10px #ff99cc;
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 2em;
      animation: fall 6s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10%); opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1 id="majid">مجد</h1>
  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <script>
    const messages = [
      "أنتِ نعمة من الله 🌹",
      "أحبكِ في الله 💖",
      "اللهم اجعل بيننا مودة ورحمة ✨",
      "أنتِ سكني وطمأنينتي 💕",
      "دعائي لكِ بالسعادة والرحمة 🌸",
      "معكِ أجد راحتي وسعادتي 🌺"
    ];
    let index = 0;
    const msgElement = document.getElementById("message");

    setInterval(() => {
      index = (index + 1) % messages.length;
      msgElement.style.opacity = 0;
      setTimeout(() => {
        msgElement.textContent = messages[index];
        msgElement.style.opacity = 1;
      }, 500);
    }, 2500);

    // قلوب تتساقط
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.textContent = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 2 + 1 + "em";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 500);
  </script>
</body>
</html>
