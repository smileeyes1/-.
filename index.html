<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إلى زوجتي الحبيبة</title>
  <style>
    body {
      background: linear-gradient(to right, #ffcccc, #ffe6e6);
      font-family: "Tahoma", sans-serif;
      text-align: center;
      color: #660033;
    }
    h1 {
      font-size: 2.5em;
      margin-top: 50px;
    }
    .heart {
      font-size: 3em;
      color: red;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    button {
      background-color: #ff3366;
      border: none;
      color: white;
      padding: 15px 30px;
      margin: 20px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc0052;
    }
    .ayah {
      margin-top: 40px;
      font-size: 1.3em;
      color: #004d40;
    }
  </style>
</head>
<body>
  <h1>إلى زوجتي الغالية 💖</h1>
  <p class="heart">❤ ❤ ❤</p>
  <p>أنتِ نعمة من الله، وهبة أكرمني بها، فأصبحتِ نورًا في حياتي وسكنًا لروحي.</p>
  
  <button onclick="alert('أحبكِ في الله، وسأظل أدعو لكِ بالسعادة والرحمة 🌹')">
    اضغطي هنا يا حبيبتي
  </button>
  
  <div class="ayah">
    <p>﴿وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً﴾ (الروم: 21)</p>
  </div>
</body>
</html>
