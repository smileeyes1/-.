<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجد ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Tahoma,sans-serif;
  background:linear-gradient(135deg,#ffd1dc,#ffe6eb,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:360px;
  padding:14px;
  text-align:center;
}

/* ===== القلب ===== */
.heart{
  width:160px;
  height:140px;
  margin:0 auto 6px;
  position:relative;
  transform:rotate(-45deg);
  background:#ff4d6d;
  animation:heartBeat 1.4s infinite;
}
.heart::before,
.heart::after{
  content:"";
  width:160px;
  height:140px;
  background:#ff4d6d;
  border-radius:50%;
  position:absolute;
}
.heart::before{top:-80px; left:0;}
.heart::after{top:0; left:80px;}

@keyframes heartBeat{
  0%{transform:scale(1) rotate(-45deg);}
  50%{transform:scale(1.08) rotate(-45deg);}
  100%{transform:scale(1) rotate(-45deg);}
}

/* ===== الأسماء ===== */
.names{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transform:rotate(45deg);
}
.name{
  font-size:1.9em;
  margin:2px 0;
}
.name span{
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  0%{color:#ffffff;text-shadow:0 0 6px #fff;}
  50%{color:#ffe066;text-shadow:0 0 14px #ffec99;}
  100%{color:#ffffff;text-shadow:0 0 18px #ffffff;}
}

/* ===== الرسالة ===== */
.message{
  background:#fff;
  border-radius:16px;
  padding:16px;
  font-size:1.15em;
  min-height:100px;
  margin:14px 0;
  line-height:1.8;
}

/* ===== الأزرار ===== */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:#fff;
  font-size:1em;
}

/* ===== نافذة السر ===== */
.secret-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.secret-box{
  background:#fff0f5;
  padding:24px;
  border-radius:22px;
  text-align:center;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

  <div class="heart">
    <div class="names">
      <div class="name" id="majd"></div>
      <div class="name" id="moh"></div>
    </div>
  </div>

  <div class="message" id="message">أنتِ نعمة من الله 🌹</div>

  <button onclick="love()">لمسة حب ❤️</button>
  <div id="counter">0 / 7</div>

  <button onclick="morning()">أذكار الصباح 🌅</button>
  <button onclick="evening()">أذكار المساء 🌙</button>
  <button onclick="duaa()">أدعية 💫</button>

</div>

<div id="secretOverlay" class="secret-overlay hidden">
  <div class="secret-box">
    <h3>💖 من محمد</h3>
    <button onclick="secret()">افتح الكلمة 💌</button>
  </div>
</div>

<script>
function buildText(id,text){
  const el=document.getElementById(id);
  [...text].forEach(l=>{
    const s=document.createElement("span");
    s.textContent=l;
    el.appendChild(s);
  });
}
buildText("majd","مجد");
buildText("moh","محمد");

const message=document.getElementById("message");
const overlay=document.getElementById("secretOverlay");

/* ===== وقت المغرب ===== */
function afterMaghrib(){
 return (new Date().getHours()>=18 || new Date().getHours()<5);
}

/* ===== إعادة تعيين بعد الفجر ===== */
if(new Date().getHours()>=5){
 localStorage.removeItem("secretCount");
}

/* ===== عداد الحب ===== */
let touches=0;
function love(){
 if(!afterMaghrib()){
  message.textContent="الكلمات السرّية تظهر بعد المغرب 🌙";
  return;
 }
 touches++;
 counter.textContent=`${touches} / 7`;
 if(touches===7){
  overlay.classList.remove("hidden");
 }
}

/* ===== أذكار الصباح (30) ===== */
const morningAzkar=[

"رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا",
"اللهم ما أصبح بي من نعمة فمنك وحدك لا شريك لك",

"اللهم عافني في بدني",
"اللهم عافني في سمعي",
"اللهم عافني في بصري",
"اللهم إني أعوذ بك من الكفر والفقر",
"اللهم احفظني من بين يدي ومن خلفي",
"اللهم استرني فوق الأرض وتحت الأرض",
"اللهم طمئن قلبي",
"اللهم نوّر يومي",
"اللهم اجعل يومي خيرًا",
"اللهم ارزقني رزقًا حلالًا طيبًا",
"اللهم يسّر أمري",
"اللهم وفقني لما تحب وترضى",
"اللهم اغفر لي ذنوبي",
"اللهم اهدني لأحسن الأخلاق",
"اللهم قرّبني إليك",
"اللهم اجعل عملي صالحًا",
"اللهم لا تكلني لنفسي",
"اللهم بارك لي في وقتي",
"والحمد لله رب العالمين"
];

/* ===== أذكار المساء (30) ===== */
const eveningAzkar=[
"أمسينا وأمسى الملك لله",
"اللهم بك أمسينا وبك أصبحنا",
"أعوذ بكلمات الله التامات من شر ما خلق",

"اللهم أعذني من الهم والحزن",
"اللهم قربني إليك",
"اللهم تقبل مني",
"اللهم ارح ضعفي",
"اللهم اجعل نومي راحة",
"اللهم احفظ أحبتي",
"اللهم لا تحرمني الأمل",

"اللهم أنس وحشتي",

/* ===== الأدعية (30) ===== */
const duaas=[
"اللهم اجبر قلبي جبرًا يليق بعظمتك",
"اللهم ارزقني طمأنينة لا تزول",
"اللهم اشفِ صدري",

"اللهم دلني على الصواب",
"اللهم يسر أمري",

"اللهم ارزقني فرحًا دائمًا",

"اللهم طهّر قلبي",

/* ===== الكلمات السرية (30) ===== */
const secretWords=[
"مجد… وجودك في حياتي نعمة من الله",
"أحبك بهدوء يشبه الطمأنينة",
"قربك أمان حقيقي",
"اسمك في قلبي قبل لساني",

"وجودك فرق في حياتي",
"قلبك جميل ونقي",
"حديثك راحة",
"قربك سلام",
"أنتِ اختياري",
"أحبك بلا شروط",
"أثق بك",
"ضحكتك حياة",
"حضورك يطمئنني",

"أحب تفاصيلك",
"قلبك أبيض",
"أحب اسمك",
"أراك سكينة",
"وجودك لطف",
"قربك نجاة",
"أحب هدوءك",
"أرتاح معك",
"أبتسم لأجلك",
"أحبك بصدق",
"لكِ مكانة عظيمة",
"وجودك نعمة",
"أنتِ أمان",
"محمد 💌"
];

let mi=0,ei=0,di=0,si=0;

function morning(){message.textContent=morningAzkar[mi++%30];}
function evening(){message.textContent=eveningAzkar[ei++%30];}
function duaa(){message.textContent=duaas[di++%30];}

function secret(){
 let c=Number(localStorage.getItem("secretCount")||0);
 if(c>=5){
  message.textContent="اكتملت كلمات اليوم 💖";
  overlay.classList.add("hidden");
  return;
 }
 message.textContent=secretWords[si++%30];
 localStorage.setItem("secretCount",c+1);
 overlay.classList.add("hidden");
}
</script>

</body>
</html>
